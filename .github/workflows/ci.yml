name: CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: make install

      - name: Build library
        run: make build-ci

      - name: Run tests
        run: make test

      - name: Run playground
        run: make playground